# Deliberate — event-driven orchestrator workflow
#
# Copy this file into your repo as `.github/workflows/deliberate-events.yml`.
# Requires:
#   - The Deliberate GitHub App installed on this repo (or org).
#   - Secrets configured at the repo or org level:
#       ANTHROPIC_API_KEY  — your Anthropic API key
#       DELIBERATE_APP_ID, DELIBERATE_APP_PRIVATE_KEY  — for App auth
#   - Optional notifier secrets (only if you've configured them in
#     .deliberate/config.yml):
#       DISCORD_WEBHOOK_URL

name: deliberate-events

on:
  issues:
    types: [opened, edited, labeled, unlabeled, closed, reopened]
  issue_comment:
    types: [created, edited]
  pull_request:
    types: [opened, synchronize, closed, reopened]
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    inputs:
      issue:
        description: "Issue number to advance"
        required: false
      event:
        description: "Synthetic event name"
        required: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  checks: write

concurrency:
  group: deliberate-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

env:
  GSTACK_REF: main
  DELIBERATE_REF: main

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    # Only fire on events the orchestrator can act on. The sender type
    # check (== 'User') is restrictive on purpose: anything authored by
    # a Bot, GitHub App, or Organization is suppressed. Within a single
    # tick the orchestrator chains stages until it hits a wait
    # condition, so its own follow-on events MUST NOT trigger redundant
    # ticks.
    if: |
      github.event_name == 'workflow_dispatch'
      || (github.event.sender.type == 'User'
          && !endsWith(github.event.sender.login, '[bot]')
          && (
            (github.event_name == 'issues' && (
              github.event.action == 'closed'
              || github.event.action == 'reopened'
              || (
                (github.event.action == 'labeled' || github.event.action == 'unlabeled')
                && (
                  startsWith(github.event.label.name, 'state:')
                  || startsWith(github.event.label.name, 'decision:')
                  || startsWith(github.event.label.name, 'kind:')
                )
              )
            ))
            || (github.event_name == 'issue_comment'
                && github.event.action == 'created')
            || (github.event_name == 'pull_request' && (
                  github.event.action == 'opened'
                  || github.event.action == 'synchronize'
                  || github.event.action == 'closed'
                ))
            || github.event_name == 'pull_request_review'
          ))
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Bun
        # gstack's setup script requires bun.
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache Claude Code CLI install
        # Caches the global npm install. Bump CACHE_V if the install layout
        # changes or the package is upgraded against the cached version.
        id: cache-claude
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/lib/node_modules/@anthropic-ai
            /usr/local/bin/claude
            ~/.local/share/claude
          key: claude-cli-${{ runner.os }}-v1

      - name: Install Claude Code CLI
        if: steps.cache-claude.outputs.cache-hit != 'true'
        run: npm install -g @anthropic-ai/claude-code

      - name: Cache gstack install
        # Caches the entire ~/.claude/skills tree, including gstack-*
        # symlinks created by ./setup --prefix. Stale 'main' references are
        # acceptable; bump the -v suffix to bust.
        # TODO: pin GSTACK_REF to a known-good commit SHA after first successful e2e.
        id: cache-gstack
        uses: actions/cache@v4
        with:
          path: ~/.claude/skills
          key: gstack-${{ env.GSTACK_REF }}-${{ runner.os }}-v1
          restore-keys: |
            gstack-${{ env.GSTACK_REF }}-${{ runner.os }}-
            gstack-

      - name: Install gstack with --prefix
        if: steps.cache-gstack.outputs.cache-hit != 'true'
        run: |
          mkdir -p $HOME/.claude/skills
          git clone --depth 1 --branch "$GSTACK_REF" \
            https://github.com/garrytan/gstack.git $HOME/.claude/skills/gstack
          cd $HOME/.claude/skills/gstack && ./setup --prefix

      - name: Cache Deliberate plugin
        # TODO: pin DELIBERATE_REF to a release tag after first successful e2e.
        id: cache-deliberate
        uses: actions/cache@v4
        with:
          path: ~/.claude/plugins
          key: deliberate-${{ env.DELIBERATE_REF }}-${{ runner.os }}-v1
          restore-keys: |
            deliberate-${{ env.DELIBERATE_REF }}-${{ runner.os }}-
            deliberate-

      - name: Install Deliberate plugin
        # Clone the deliberate plugin so the orchestrator step can load it
        # via --plugin-dir. enabledPlugins in settings.json activates an
        # installed plugin, not raw files — for headless use we bypass the
        # marketplace install entirely with --plugin-dir.
        if: steps.cache-deliberate.outputs.cache-hit != 'true'
        run: |
          mkdir -p $HOME/.claude/plugins
          git clone --depth 1 --branch "$DELIBERATE_REF" \
            https://github.com/scottholdren/deliberate.git \
            $HOME/.claude/plugins/deliberate

      - name: Get App installation token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.DELIBERATE_APP_ID }}
          private-key: ${{ secrets.DELIBERATE_APP_PRIVATE_KEY }}

      - name: Build event payload
        run: |
          cat > /tmp/event.json <<EOF
          {
            "event": "${{ github.event_name }}.${{ github.event.action }}",
            "repo": "${{ github.repository }}",
            "issue": ${{ toJSON(github.event.issue.number || null) }},
            "pr": ${{ toJSON(github.event.pull_request.number || null) }},
            "label": ${{ toJSON(github.event.label.name || null) }},
            "comment_id": ${{ toJSON(github.event.comment.id || null) }},
            "actor": "${{ github.actor }}"
          }
          EOF
          echo "Built event payload:"
          cat /tmp/event.json

      - name: Run orchestrator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          EVENT=$(cat /tmp/event.json)
          PROMPT=$(cat <<PROMPT_EOF
          Invoke the /deliberate:orchestrator skill against the following GitHub event payload. Do not reason about the event yourself before invoking the skill — the skill contains the routing logic.

          \`\`\`json
          $EVENT
          \`\`\`

          After the skill returns, print one sentence summarizing what changed on the issue/PR (or why no change occurred). If the skill is not available, say so explicitly.
          PROMPT_EOF
          )

          claude -p "$PROMPT" \
            --plugin-dir $HOME/.claude/plugins/deliberate \
            --permission-mode bypassPermissions \
            --output-format text \
            --verbose
